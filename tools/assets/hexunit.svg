<svg role="img" viewBox="0 0 300 300" fill="none" aria-label="HEX unit: hexagon with six edge-mounted cylindrical cells, a solar top face, and an optional magnetic screen">
            <!-- sun -->
            <g stroke="#fe9a0d" stroke-width="2">
              <circle cx="266" cy="34" r="11" fill="#fe9a0d" stroke="none"/>
              <line x1="266" y1="13" x2="266" y2="6"/><line x1="266" y1="55" x2="266" y2="62"/>
              <line x1="245" y1="34" x2="238" y2="34"/><line x1="287" y1="34" x2="294" y2="34"/>
              <line x1="251" y1="19" x2="246" y2="14"/><line x1="281" y1="49" x2="286" y2="54"/>
              <line x1="281" y1="19" x2="286" y2="14"/><line x1="251" y1="49" x2="246" y2="54"/>
            </g>

            <!-- hexagon body -->
            <polygon points="242,150 196,70.3 104,70.3 58,150 104,229.7 196,229.7"
                     fill="#241f1b" stroke="#f6f1e7" stroke-width="2.5"/>

            <!-- solar top face -->
            <polygon points="204,150 177,103.2 123,103.2 96,150 123,196.8 177,196.8"
                     fill="#12b795" stroke="#0c7a63" stroke-width="2"/>
            <g stroke="#0c7a63" stroke-width="1.3" opacity=".85">
              <line x1="150" y1="103.2" x2="150" y2="196.8"/>
              <line x1="123" y1="103.2" x2="177" y2="196.8"/>
              <line x1="177" y1="103.2" x2="123" y2="196.8"/>
            </g>
            <text x="150" y="139" fill="#04463a" font-size="10" text-anchor="middle" font-family="monospace" font-weight="700">SOLAR</text>
            <text x="150" y="167" fill="#04463a" font-size="8" text-anchor="middle" font-family="monospace">TOP FACE</text>

            <!-- six edge-mounted cells (one per edge, 60° apart) -->
            <g stroke="#1d1a17" stroke-width="1.5">
              <g transform="rotate(0 150 150)">
                <rect x="118" y="61.3" width="64" height="18" rx="9" fill="#f6f1e7"/>
                <rect x="123" y="61.3" width="5" height="18" fill="#fe9a0d" stroke="none"/>
                <rect x="182" y="66.3" width="5" height="8" rx="1.5" fill="#fe9a0d"/>
              </g>
              <g transform="rotate(60 150 150)">
                <rect x="118" y="61.3" width="64" height="18" rx="9" fill="#f6f1e7"/>
                <rect x="123" y="61.3" width="5" height="18" fill="#fe9a0d" stroke="none"/>
                <rect x="182" y="66.3" width="5" height="8" rx="1.5" fill="#fe9a0d"/>
              </g>
              <g transform="rotate(120 150 150)">
                <rect x="118" y="61.3" width="64" height="18" rx="9" fill="#f6f1e7"/>
                <rect x="123" y="61.3" width="5" height="18" fill="#fe9a0d" stroke="none"/>
                <rect x="182" y="66.3" width="5" height="8" rx="1.5" fill="#fe9a0d"/>
              </g>
              <g transform="rotate(180 150 150)">
                <rect x="118" y="61.3" width="64" height="18" rx="9" fill="#f6f1e7"/>
                <rect x="123" y="61.3" width="5" height="18" fill="#fe9a0d" stroke="none"/>
                <rect x="182" y="66.3" width="5" height="8" rx="1.5" fill="#fe9a0d"/>
              </g>
              <g transform="rotate(240 150 150)">
                <rect x="118" y="61.3" width="64" height="18" rx="9" fill="#f6f1e7"/>
                <rect x="123" y="61.3" width="5" height="18" fill="#fe9a0d" stroke="none"/>
                <rect x="182" y="66.3" width="5" height="8" rx="1.5" fill="#fe9a0d"/>
              </g>
              <g transform="rotate(300 150 150)">
                <rect x="118" y="61.3" width="64" height="18" rx="9" fill="#f6f1e7"/>
                <rect x="123" y="61.3" width="5" height="18" fill="#fe9a0d" stroke="none"/>
                <rect x="182" y="66.3" width="5" height="8" rx="1.5" fill="#fe9a0d"/>
              </g>
            </g>

            <!-- optional magnetic screen module -->
            <g>
              <line x1="58" y1="150" x2="42" y2="150" stroke="#12b795" stroke-width="1.4" stroke-dasharray="3 3"/>
              <circle cx="50" cy="143" r="2.4" fill="#12b795"/>
              <circle cx="50" cy="157" r="2.4" fill="#12b795"/>
              <rect x="6" y="123" width="34" height="54" rx="4" fill="#241f1b" stroke="#f6f1e7" stroke-width="2"/>
              <rect x="11" y="129" width="24" height="34" rx="2" fill="#12b795"/>
              <text x="23" y="150" fill="#04463a" font-size="7" text-anchor="middle" font-family="monospace">UI</text>
              <text x="23" y="171" fill="#f6f1e7" font-size="6.5" text-anchor="middle" font-family="monospace">SCREEN</text>
            </g>

            <!-- energy callout -->
            <text x="150" y="256" fill="#f6f1e7" font-size="12" text-anchor="middle" font-family="monospace" font-weight="700">6S · 14.46 Wh</text>
            <text x="150" y="272" fill="#12b795" font-size="8.5" text-anchor="middle" font-family="monospace">6 × 2.41 Wh · 45 × 13 mm cells</text>
          </svg>